<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="48" fill="url(#shine)"/>
  <!-- Graduation cap -->
  <!-- Hat base (mortarboard top) -->
  <polygon points="50,22 82,38 50,54 18,38" fill="white" opacity="0.95"/>
  <!-- Hat brim shadow -->
  <polygon points="50,54 82,38 82,42 50,58 18,42 18,38" fill="white" opacity="0.4"/>
  <!-- Tassel cord -->
  <line x1="82" y1="38" x2="82" y2="58" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <circle cx="82" cy="60" r="4" fill="#fbbf24"/>
  <!-- Book / E letter on hat -->
  <text x="50" y="47" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#6366f1">E</text>
  <!-- Bottom arch accent -->
  <path d="M 26 62 Q 50 80 74 62" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
